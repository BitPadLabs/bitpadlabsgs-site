---
layout: default
---

<article class="post">
  <header class="post-header">
    {% if page.image %}
      <div class="post-featured-image">
        <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" class="featured-image">
      </div>
    {% endif %}
    
    <h1 class="post-title">{{ page.title }}</h1>
    
    <div class="post-meta">
      <span class="post-date">{{ page.date | date: "%B %d, %Y" }}</span>
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>

<style>
.post {
  max-width: 800px;
  margin: 0 auto;
  padding: 4rem 2rem;
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
}

.post-featured-image {
  margin-bottom: 2rem;
  text-align: center;
}

.post-featured-image .featured-image {
  max-width: 100%;
  height: auto;
  border-radius: 12px;
}

.post-title {
  font-size: 2.5rem;
  font-weight: 700;
  text-align: center;
  margin-bottom: 1rem;
}

.post-meta {
  text-align: center;
  margin-bottom: 2rem;
  padding-bottom: 2rem;
  border-bottom: 2px solid #ACB8AF;
}

.post-date {
  font-size: 1rem;
  font-weight: 600;
  color: #59675B;
}

.post-content {
  font-size: 1.1rem;
  line-height: 1.8;
  color: #172030;
}

.post-content h2,
.post-content h3 {
  margin-top: 2rem;
  margin-bottom: 1rem;
}

.post-content p {
  margin-bottom: 1.5rem;
}

.post-content ul,
.post-content ol {
  margin-bottom: 1.5rem;
  padding-left: 2rem;
}
</style>
